<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-Club · Sor-Öner</title>
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #3b82f6;
      --accent-dim:#1d4ed8;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --success:   #238636;
      --error:     #da3633;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    /* Title */
    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* Form */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      resize: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 120px;
      line-height: 1.6;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 8px;
    }

    .btn:hover  { background: var(--accent-dim); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success screen */
    .success {
      display: none;
      text-align: center;
      padding: 16px 0;
    }

    .success-icon {
      width: 56px;
      height: 56px;
      background: rgba(35, 134, 54, 0.15);
      border: 1px solid var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
    }

    .success h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .success p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Error */
    .error-msg {
      display: none;
      background: rgba(218, 54, 51, 0.1);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff7b72;
      margin-top: 12px;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo">D</div>
    <h1>D-Club</h1>
  </div>

  <!-- Form View -->
  <div id="formView">
    <div class="title">Sor &amp; Öner</div>
    <div class="subtitle">Soru, öneri veya görüşlerinizi bizimle paylaşın. En kısa sürede değerlendirip geri dönüş yapacağız.</div>

    <div class="field">
      <label>İsminiz</label>
      <input type="text" id="name" placeholder="İsminiz" />
    </div>

    <div class="field">
      <label>Telegram Kullanıcı Adı</label>
      <input type="text" id="username" placeholder="@kullaniciadi" />
    </div>

    <div class="field">
      <label>Mesajınız</label>
      <textarea id="message" placeholder="Soru veya önerinizi buraya yazın..."></textarea>
    </div>

    <button class="btn" id="sendBtn" onclick="submitForm()">Gönder →</button>
    <div class="error-msg" id="errorMsg">Bir hata oluştu. Lütfen tekrar deneyin.</div>
  </div>

  <!-- Success View -->
  <div class="success" id="successView">
    <div class="success-icon">✓</div>
    <h2>Mesajınız Alındı!</h2>
    <p>Soru-Öneriniz alınmıştır.<br>Değerlendirilerek geri dönüş yapılacaktır.<br><br>Teşekkür ederiz 🙏</p>
  </div>

  <div class="footer">D-Club · Güvenli giriş</div>
</div>

<script>
  const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxV8fvUqHSsPdQcIj3xUs-FDJoQfICqgX2t0cwyMjmm64cvy2iq1JQt4PHGLjN1K_Wy/exec";

  async function submitForm() {
    const name     = document.getElementById("name").value.trim();
    const username = document.getElementById("username").value.trim();
    const message  = document.getElementById("message").value.trim();
    const btn      = document.getElementById("sendBtn");
    const errorMsg = document.getElementById("errorMsg");

    if (!name || !message) {
      errorMsg.textContent = "Lütfen ad ve mesaj alanlarını doldurun.";
      errorMsg.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Gönderiliyor...";
    errorMsg.style.display = "none";

    try {
      await fetch(WEBHOOK_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ type: "feedback", name, username, message })
      });

      document.getElementById("formView").style.display = "none";
      document.getElementById("successView").style.display = "block";

    } catch (e) {
      errorMsg.textContent = "Bir hata oluştu. Lütfen tekrar deneyin.";
      errorMsg.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Gönder →";
    }
  }
</script>

</body>
</html>
